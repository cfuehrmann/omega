# Trunk config — invoked by `just web-leptos-build`.
#
# `public_url = "/"` makes generated asset URLs (the wasm-bindgen
# JS shim and the .wasm file) resolve at the site root, where
# `omega-server`'s fallback `ServeDir` serves the bundle. (Phase 4
# flip; the prior `/leptos/` alias mount was removed alongside
# the Playwright deletion.)

[build]
public_url = "/"
dist       = "dist"
