# cargo-mutants configuration for the omega Rust workspace.
# See https://mutants.rs/ for the full schema.
#
# Equivalent-mutant suppressions live on the source lines themselves via
# #[mutants::skip] when possible. Statement-level equivalents (where a
# function-wide skip would lose coverage of legitimate mutants) are
# excluded here with a regex matching the mutant description.

# omega-e2e: all tests are #[ignore = "browser"] (require live Chromium).
# Mutations in the harness helpers are untestable without browser infrastructure.
# Coverage is provided by the e2e sweeps run separately via `just e2e`.
exclude = ["crates/omega-e2e/**"]

exclude_re = [
    # router.rs handle_socket: deleting `Message::Close(_) => break;` makes
    # Close frames fall through to `_ => continue`, but the next
    # `reader.next()` returns None (stream end) and the while-let exits
    # identically. Equivalent mutant, fully documented in-source.
    "delete match arm Message::Close\\(_\\) in handle_socket",
]
