# Workspace-wide cargo configuration.
#
# Phase 3.7 (deletion pass) removed the `TS_RS_EXPORT_DIR` and
# `TS_RS_LARGE_INT` env vars: ts-rs is gone, the `rust/bindings/`
# directory is gone, and the TS bridge has retired with the
# SolidJS frontend. See `rust-migration.md` §"Phase 3.7 — done".

[build]
# Promote all rustc-native warnings to errors so that `cargo build` fails on
# any warning, not just during `cargo clippy`. Note: Clippy-specific lints
# (clippy::all, clippy::pedantic, etc.) are still only evaluated when
# `cargo clippy` is invoked; -D warnings here covers the rustc-native subset.
rustflags = ["-D", "warnings"]
