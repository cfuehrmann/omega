# Configuration for the omega-protocol workspace.
#
# TS_RS_EXPORT_DIR: all ts-rs #[ts(export)] types write to rust/bindings/.
#   relative = true  →  path resolved relative to this file's directory
#   "../bindings"    →  rust/.cargo/../bindings  =  rust/bindings/
#
# TS_RS_LARGE_INT: map i64/u64/i128/u128 to TypeScript `number` (not bigint).
#   All token counts, byte counts, and millisecond durations in omega-protocol
#   are well within Number.MAX_SAFE_INTEGER; the TS client treats them as number.

[build]
# Promote all rustc-native warnings to errors so that `cargo build` fails on
# any warning, not just during `cargo clippy`. Note: Clippy-specific lints
# (clippy::all, clippy::pedantic, etc.) are still only evaluated when
# `cargo clippy` is invoked; -D warnings here covers the rustc-native subset.
rustflags = ["-D", "warnings"]

[env]
TS_RS_EXPORT_DIR = { value = "../bindings", relative = true }
TS_RS_LARGE_INT  = "number"
